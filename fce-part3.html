            text-align: center;
            padding: 2rem 1rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .container {

            margin: 0 auto;
            padding: 0 1rem;
        }

        .nav-back {
            margin-bottom: 15px;
        }

        .nav-back a {
            text-decoration: none;
            color: #7f8c8d;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 1.5rem;
            background: white;
            padding: 10px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .tab-btn {
            flex: 1;
            min-width: 140px;
            padding: 10px 15px;
            border: none;
            background-color: var(--light-color);
            color: var(--dark-color);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .tab-btn:hover {
            background-color: #dfe6e9;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(41, 128, 185, 0.3);
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            background: white;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .book-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-shuffle {
            background-color: #f39c12;
            color: white;
        }

        .btn-shuffle:hover {
            background-color: #e67e22;
            transform: translateY(-2px);
        }

        .btn-next-book {
            background-color: #2ecc71;
            color: white;
            font-size: 1.1rem;
            padding: 15px 30px;
            margin: 30px auto 10px auto;
            display: none;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        .quiz-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border-left: 5px solid var(--primary-color);
            transition: var(--transition);
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options-grid.binary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--light-color);
            border: 2px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .options-grid.binary .option-btn {
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #edf2f7;
            border-color: #cbd5e0;
            transform: translateX(5px);
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24 !important;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .progress-bar-container {
            background: #dee2e6;
            border-radius: 50px;
            height: 10px;
            width: 100%;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--success-color);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        @media (max-width: 600px) {
            .tabs-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
        }

</head>

        { "num": 23, "q": "Bổ sung Sophia: Which, according to Sopia, are the most difficult things to translate?", "a": "Cultural references", "type": "mcq" },
        { "num": 24, "q": "Bổ sung Sophia: Where does Sophia get most of her work?", "a": "Through translation agencies", "type": "mcq" },
        { "num": 25, "q": "Bổ sung Sophia: How does she feel about her daily working hours?", "a": "She seldom gets paid on time", "type": "mcq" }
    ]
};

let allCorrectAnswers = [];
for (let section in rawData) {
    rawData[section].forEach(item => {
        if (!allCorrectAnswers.includes(item.a.trim().toLowerCase())) {
            allCorrectAnswers.push(item.a.trim().toLowerCase());
        }
    });
}

const distractorPool = [
    "He wanted to complete his education first", "She was deeply disappointed by the results",
    "It requires long years of hard training", "Because they offered a much higher income",
    "A completely unexpected family emergency", "By hiring a local vehicle or walking",
    "It was canceled due to sudden political situations", "The local authority refused to fund the project",
    "The environment was far more challenging", "To find more advanced guidelines online",
    "She felt insecure about talking to strangers", "In front of a large international airport",
    "It was postponed until next autumn season", "The instructions given were too confusing",
    "They plan to start a different course together", "He could not finish his homework on time"
];

const bookKeys = Object.keys(rawData);
let currentBookIndex = 0;
let currentQuestions = [];
let userScoreMap = {};

document.addEventListener("DOMContentLoaded", () => {
    renderTabs();
    loadBook(bookKeys[0]);
});

function renderTabs() {
    const tabsBox = document.getElementById("tabs-box");
    tabsBox.innerHTML = "";
    bookKeys.forEach((bookName, index) => {
        const btn = document.createElement("button");
        btn.className = `tab-btn ${index === currentBookIndex ? 'active' : ''}`;
        btn.innerText = bookName;
        btn.onclick = () => {
            currentBookIndex = index;
            loadBook(bookName);
        };
        tabsBox.appendChild(btn);
    });
}

function loadBook(bookName) {
    document.getElementById("current-book-title").innerText = bookName;
    
    const tabs = document.querySelectorAll(".tab-btn");
    tabs.forEach((tab, idx) => {
        if (idx === currentBookIndex) tab.classList.add("active");
        else tab.classList.remove("active");
    });

    currentQuestions = JSON.parse(JSON.stringify(rawData[bookName]));
    userScoreMap = {};
    currentQuestions.forEach((_, idx) => { userScoreMap[idx] = false; });

    renderQuestions();
    updateProgressBar();
}

function generateOptions(qObj) {
    if (qObj.type === "tf") return ["T", "F"];
    if (qObj.type === "ab") return ["A", "B"];
    
    let options = [qObj.a];
    let safeDistractors = distractorPool.filter(ans => {
        return !allCorrectAnswers.includes(ans.trim().toLowerCase()) && ans.trim().toLowerCase() !== qObj.a.trim().toLowerCase();
    });
    
    safeDistractors.sort(() => Math.random() - 0.5);
    for (let i = 0; i < 3; i++) {
        if(safeDistractors[i]) {
            options.push(safeDistractors[i]);
        } else {
            options.push("Alternative Option Answer " + (i + 1)); 
        }
    }
    return options.sort(() => Math.random() - 0.5);
}

function renderQuestions() {
    const quizBox = document.getElementById("quiz-box");
    quizBox.innerHTML = "";

    currentQuestions.forEach((qObj, qIndex) => {
        if (!qObj.generatedOptions) {
            qObj.generatedOptions = generateOptions(qObj);
        }

        const card = document.createElement("div");
        card.className = "question-card";

        const qText = document.createElement("div");
        qText.className = "question-text";
        qText.innerText = `Câu ${qObj.num}: ${qObj.q}`;
        card.appendChild(qText);

        const optionsGrid = document.createElement("div");
        optionsGrid.className = `options-grid ${qObj.type !== 'mcq' ? 'binary' : ''}`;

        qObj.generatedOptions.forEach(optionText => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = optionText;
            
            btn.onclick = () => checkAnswer(btn, optionText, qObj.a, qIndex, optionsGrid);
            optionsGrid.appendChild(btn);
        });

        card.appendChild(optionsGrid);
        quizBox.appendChild(card);
    });
}

function checkAnswer(selectedBtn, selectedText, correctAnswer, qIndex, optionsGrid) {
    const allButtons = optionsGrid.querySelectorAll(".option-btn");
    allButtons.forEach(btn => btn.disabled = true);

    if (selectedText.trim().toLowerCase() === correctAnswer.trim().toLowerCase()) {
        selectedBtn.classList.add("correct");
        userScoreMap[qIndex] = true;
    } else {
        selectedBtn.classList.add("wrong");
        userScoreMap[qIndex] = false;
        
        allButtons.forEach(btn => {
            if (btn.innerText.trim().toLowerCase() === correctAnswer.trim().toLowerCase()) {
                btn.classList.add("correct");
            }
        });
    }
    updateProgressBar();
}

function updateProgressBar() {
    const total = currentQuestions.length;
    if (total === 0) return;

    const correctCount = Object.values(userScoreMap).filter(val => val === true).length;
    const percentage = (correctCount / total) * 100;

    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    const btnNext = document.getElementById("btn-next");

    progressBar.style.width = `${percentage}%`;
    progressText.innerText = `${correctCount}/${total} ĐÚNG`;

    if (correctCount === total) {
        btnNext.style.style.display = "block";
    } else {
        btnNext.style.style.display = "none";
    }
}

function shuffleCurrentBook() {
    currentQuestions.sort(() => Math.random() - 0.5);
    userScoreMap = {};
    currentQuestions.forEach((_, idx) => { userScoreMap[idx] = false; });
    renderQuestions();
    updateProgressBar();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToNextBook() {
    if (currentBookIndex < bookKeys.length - 1) {
        currentBookIndex++;
        loadBook(bookKeys[currentBookIndex]);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        alert("Chúc mừng bạn! Bạn đã hoàn thành xuất sắc toàn bộ hệ thống câu hỏi FCE từ 21-25!");
    }
}
</script>
