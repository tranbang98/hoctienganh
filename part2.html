            --light-color: #f8f9fa;

            --transition: all 0.3s ease;
        }

        * {

            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: var(--dark-color);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #34495e, #2c3e50);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 1.5rem;
            background: white;
            padding: 10px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .tab-btn {
            flex: 1;
            min-width: 100px;
            padding: 10px 15px;
            border: none;
            background-color: var(--light-color);
            color: var(--dark-color);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .tab-btn:hover {
            background-color: #dfe6e9;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            background: white;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .book-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-shuffle {
            background-color: #f39c12;
            color: white;
        }

        .btn-shuffle:hover {
            background-color: #e67e22;
            transform: translateY(-2px);
        }

        .btn-next-book {
            background-color: #9b59b6;
            color: white;
            font-size: 1.1rem;
            padding: 15px 30px;
            margin: 30px auto 10px auto;
            display: none;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
            animation: bounce 2s infinite;
        }

        .btn-next-book:hover {
            background-color: #8e44ad;
        }

        .quiz-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border-left: 5px solid var(--primary-color);
            transition: var(--transition);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: var(--light-color);
            border: 2px solid #e2e8f0;
            padding: 12px 18px;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #edf2f7;
            border-color: #cbd5e0;
            transform: translateX(5px);
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24 !important;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .progress-bar-container {
            background: #dee2e6;
            border-radius: 50px;
            height: 10px;
            width: 100%;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--success-color);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        @media (max-width: 600px) {
            .tabs-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
            }
            .control-panel {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>

let allCorrectAnswers = [];
for (let book in rawData) {
    rawData[book].forEach(item => {
        if (!allCorrectAnswers.includes(item.a.trim().toLowerCase())) {
            allCorrectAnswers.push(item.a.trim().toLowerCase());
        }
    });
}

// Bổ sung kho dữ liệu đáp án ảo phong phú, không trùng bất cứ đáp án thật nào
const distractorPool = [
    "At a local community center", "They prefer classical violin", "In the main city library", 
    "It was postponed due to bad weather", "By taking a taxi or walking", "He felt very tired and bored", 
    "She dropped her passport on the way", "On a rainy Thursday morning", "A complete waste of time", 
    "Working with strict managers", "The flight was delayed by two hours", "In an ancient historical museum", 
    "Learning foreign languages easily", "They didn't like the main actor", "At half past nine (9:30)", 
    "Because the prices were too high", "A modern art collection", "To practice swimming skills", 
    "Near the central railway station", "With some fresh strawberries"
];

const bookKeys = Object.keys(rawData);
let currentBookIndex = 0;
let currentQuestions = [];
let userScoreMap = {};

document.addEventListener("DOMContentLoaded", () => {
    renderTabs();
    loadBook(bookKeys[0]);
});

function renderTabs() {
    const tabsBox = document.getElementById("tabs-box");
    tabsBox.innerHTML = "";
    bookKeys.forEach((bookName, index) => {
        const btn = document.createElement("button");
        btn.className = `tab-btn ${index === currentBookIndex ? 'active' : ''}`;
        btn.innerText = bookName;
        btn.onclick = () => {
            currentBookIndex = index;
            loadBook(bookName);
        };
        tabsBox.appendChild(btn);
    });
}

function loadBook(bookName) {
    document.getElementById("current-book-title").innerText = bookName;
    
    const tabs = document.querySelectorAll(".tab-btn");
    tabs.forEach((tab, idx) => {
        if (idx === currentBookIndex) tab.classList.add("active");
        else tab.classList.remove("active");
    });

    currentQuestions = JSON.parse(JSON.stringify(rawData[bookName]));
    
    userScoreMap = {};
    currentQuestions.forEach((_, idx) => { userScoreMap[idx] = false; });

    renderQuestions();
    updateProgressBar();
}

function generateOptions(correctAnswer) {
    let options = [correctAnswer];
    
    let safeDistractors = distractorPool.filter(ans => {
        return !allCorrectAnswers.includes(ans.trim().toLowerCase()) && ans.trim().toLowerCase() !== correctAnswer.trim().toLowerCase();
    });
    
    safeDistractors.sort(() => Math.random() - 0.5);
    
    for (let i = 0; i < 3; i++) {
        if(safeDistractors[i]) {
            options.push(safeDistractors[i]);
        } else {
            options.push("Alternative Answer Choice " + (i + 1)); 
        }
    }

    return options.sort(() => Math.random() - 0.5);
}

function renderQuestions() {
    const quizBox = document.getElementById("quiz-box");
    quizBox.innerHTML = "";

    currentQuestions.forEach((qObj, qIndex) => {
        if (!qObj.generatedOptions) {
            qObj.generatedOptions = generateOptions(qObj.a);
        }

        const card = document.createElement("div");
        card.className = "question-card";
        card.id = `q-card-${qIndex}`;

        const qText = document.createElement("div");
        qText.className = "question-text";
        qText.innerText = qObj.q.includes("Câu") || qObj.q.includes("Question") ? `${qObj.q}:` : `Câu ${qIndex + 1}: ${qObj.q}`;
        card.appendChild(qText);

        const optionsGrid = document.createElement("div");
        optionsGrid.className = "options-grid";

        qObj.generatedOptions.forEach(optionText => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = optionText;
            
            btn.onclick = () => checkAnswer(btn, optionText, qObj.a, qIndex, optionsGrid);
            optionsGrid.appendChild(btn);
        });

        card.appendChild(optionsGrid);
        quizBox.appendChild(card);
    });
}

function checkAnswer(selectedBtn, selectedText, correctAnswer, qIndex, optionsGrid) {
    const allButtons = optionsGrid.querySelectorAll(".option-btn");
    allButtons.forEach(btn => btn.disabled = true);

    if (selectedText === correctAnswer) {
        selectedBtn.classList.add("correct");
        userScoreMap[qIndex] = true;
    } else {
        selectedBtn.classList.add("wrong");
        userScoreMap[qIndex] = false;
        
        allButtons.forEach(btn => {
            if (btn.innerText === correctAnswer) {
                btn.classList.add("correct");
            }
        });
    }

    updateProgressBar();
}

function updateProgressBar() {
    const total = currentQuestions.length;
    if (total === 0) return;

    const correctCount = Object.values(userScoreMap).filter(val => val === true).length;
    const percentage = (correctCount / total) * 100;

    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    const btnNext = document.getElementById("btn-next");

    progressBar.style.width = `${percentage}%`;
    progressText.innerText = `${correctCount}/${total} ĐÚNG`;

    if (correctCount === total) {
        btnNext.style.display = "block";
    } else {
        btnNext.style.display = "none";
    }
}

function shuffleCurrentBook() {
    currentQuestions.sort(() => Math.random() - 0.5);
    
    currentQuestions.forEach(qObj => {
        qObj.generatedOptions = generateOptions(qObj.a);
    });

    userScoreMap = {};
    currentQuestions.forEach((_, idx) => { userScoreMap[idx] = false; });

    renderQuestions();
    updateProgressBar();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToNextBook() {
    if (currentBookIndex < bookKeys.length - 1) {
        currentBookIndex++;
        loadBook(bookKeys[currentBookIndex]);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        alert("Chúc mừng bạn! Bạn đã xuất sắc hoàn thành toàn bộ các quyển bài tập PET!");
    }
}
